<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement annulé – Empire YourTvSat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #e8e8e8;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.2rem;
    }
    .title {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      color: #C0C0C0;
      margin-bottom: 0.8rem;
    }
    .desc {
      color: #888;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2.2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2.5rem;
      background: linear-gradient(135deg, #B8860B, #FFD700);
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 24px rgba(255,215,0,0.25);
      transition: transform 0.15s;
    }
    .btn:hover { transform: scale(1.04); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">↩</div>
    <h1 class="title">Paiement Annulé</h1>
    <p class="desc">
      Votre paiement a été annulé. Aucun montant n'a été débité.<br><br>
      Revenez quand vous voulez pour rejoindre l'Empire YourTvSat.
    </p>
    <a href="/" class="btn">↩ Retour à l'accueil</a>
  </div>
</body>
</html>
