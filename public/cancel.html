<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement annulé – Empire YourTvSat VIP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --gold: #FFD700; --silver: #C0C0C0; --bg: #080810; --card: #10101e; }

    body {
      background: var(--bg); color: var(--gold);
      font-family: 'Segoe UI', Montserrat, Arial, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem 1rem;
    }

    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: #fff; opacity: 0;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: 0.6; transform: scale(1.1); }
    }

    .card {
      position: relative; z-index: 1;
      background: var(--card); border: 1px solid #FF450033;
      border-radius: 24px; padding: 3rem 2.5rem;
      max-width: 480px; width: 100%; text-align: center;
      box-shadow: 0 0 40px #FF450011;
    }

    .icon { font-size: 4rem; margin-bottom: 1.2rem; }

    h1 {
      font-size: 2rem; margin-bottom: .6rem;
      color: var(--gold);
    }
    p { color: var(--silver); margin-bottom: 1.8rem; font-size: 1rem; line-height: 1.6; }

    .btn {
      display: inline-block; padding: .85rem 2.5rem;
      background: linear-gradient(90deg, #FFD700, #e6c200);
      color: #111; font-weight: 900; font-size: 1rem;
      text-transform: uppercase; letter-spacing: 1px;
      border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 0 18px #FFD70033; text-decoration: none;
      transition: transform .15s;
    }
    .btn:hover { transform: scale(1.03); }
  </style>
</head>
<body>

<div id="stars"></div>

<div class="card">
  <div class="icon">❌</div>
  <h1>Paiement annulé</h1>
  <p>
    Votre paiement a été annulé et aucun montant n'a été débité.<br>
    Vous pouvez réessayer à tout moment.
  </p>
  <a class="btn" href="/">↩ Retourner à l'accueil</a>
</div>

<script>
  (function() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div'); s.className = 'star';
      const sz = Math.random()*2+.5;
      s.style.cssText = [
        `width:${sz}px`,`height:${sz}px`,
        `top:${Math.random()*100}%`,`left:${Math.random()*100}%`,
        `animation-delay:${Math.random()*5}s`,
        `animation-duration:${Math.random()*3+2}s`
      ].join(';');
      c.appendChild(s);
    }
  })();
</script>
</body>
</html>
