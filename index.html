<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE VIP - H.A. ROUIS</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Montserrat', sans-serif; margin: 0; }
        .cinzel { font-family: 'Cinzel', serif; }
        
        /* Effet de lueur sur l'Or */
        .gold-text {
            background: linear-gradient(to bottom, #f9e27e 0%, #d4af37 50%, #b38728 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
        }

        /* Bouton Premium */
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #996515 100%);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-gold:active { transform: scale(0.95); }

        /* Animation du fond */
        .bg-glow {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, rgba(5, 5, 5, 0) 70%);
            z-index: -1;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="bg-glow"></div>

    <!-- Navigation Épurée -->
    <nav class="p-6 flex justify-between items-center bg-black/50 backdrop-blur-lg sticky top-0 z-50 border-b border-white/5">
        <div class="cinzel gold-text text-xl font-bold tracking-widest">EMPIRE VIP</div>
        <div class="w-8 h-8 rounded-full border border-yellow-500/50 flex items-center justify-center">
            <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
        </div>
    </nav>

    <!-- Contenu Principal -->
    <main class="flex-grow flex flex-col items-center justify-center px-8 text-center mt-10">
        
        <span class="text-[10px] tracking-[0.5em] uppercase text-yellow-500/60 mb-4">Système de Pilotage Média</span>
        
        <h1 class="cinzel text-4xl md:text-6xl font-bold leading-tight mb-8">
            LE PRESTIGE DU <br>
            <span class="gold-text uppercase tracking-tighter text-5xl md:text-7xl">Pilotage Média</span>
        </h1>

        <p class="text-gray-400 text-sm md:text-base max-w-sm leading-relaxed font-light mb-12">
            L'automatisation totale au service de votre divertissement. Entrez dans l'ère de la <span class="text-white font-medium">gestion autonome 8K</span>.
        </p>

        <!-- Espace Satellite (Placeholder interactif) -->
        <div class="relative w-64 h-64 mb-12 flex items-center justify-center">
             <div class="absolute inset-0 border border-yellow-500/10 rounded-full animate-[spin_10s_linear_infinite]"></div>
             <div class="absolute w-48 h-48 border border-yellow-500/20 rounded-full animate-[spin_15s_linear_infinite_reverse]"></div>
             <img src="https://flaticon.com" class="w-32 opacity-80 brightness-150 filter sepia" alt="Satellite Gold">
        </div>

        <button class="btn-gold w-full max-w-xs py-5 rounded-xl text-black font-black text-sm tracking-[0.2em] uppercase mb-4">
            Débloquer la Console (5.55€/an)
        </button>
        
        <p class="text-[9px] text-gray-600 uppercase tracking-widest">Paiement sécurisé par Stripe & Crypto</p>
    </main>

    <!-- Footer Mobile Fixe -->
    <footer class="p-6 text-center border-t border-white/5 bg-black">
        <p class="text-[10px] text-gray-500 tracking-widest">&copy; 2026 EDITION LIMITÉE - H.A. ROUIS</p>
    </footer>

</body>
</html>
