<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TES SAT</title>

<style>
body {
    margin:0;
    background:black;
    color:#FFD700;
    font-family:Arial;
    text-align:center;
}

/* Container mobile */
.container {
    padding:20px;
    max-width:400px;
    margin:auto;
}

/* Title */
h1 {
    font-size:28px;
    margin-top:20px;
}

/* Subtitle */
.subtitle {
    font-size:14px;
    opacity:0.8;
}

/* Satellite */
.satellite {
    width:100px;
    height:100px;
    background:gold;
    border-radius:50%;
    margin:30px auto;
    animation: spin 6s linear infinite;
}

@keyframes spin {
    from {transform: rotate(0);}
    to {transform: rotate(360deg);}
}

/* Message important */
.highlight {
    background:#111;
    padding:15px;
    border-radius:10px;
    margin:20px 0;
    font-size:14px;
}

/* Button */
button {
    width:100%;
    padding:15px;
    background:#FFD700;
    color:black;
    border:none;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

/* Result box */
.box {
    margin-top:20px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <h1>TES SAT</h1>
    <p class="subtitle">Console VIP Streaming</p>

    <div class="satellite"></div>

    <!-- MESSAGE BUSINESS IMPORTANT -->
    <div class="highlight">
        🎁 <b>Test gratuit disponible après activation</b><br><br>
        🔓 Accès à vie à l'application<br>
        💎 Interface VIP + outils premium<br><br>
        ⚠️ Le QR Code est généré uniquement après paiement
    </div>

    <!-- PRIX CLAIR -->
    <div class="highlight">
        💳 <b>5.55€ / an</b><br>
        (Accès à l'application uniquement — pas un abonnement contenu)
    </div>

    <div id="app"></div>

</div>

<script>
// =======================
// SIMULATION PAIEMENT (remplacer par Stripe après)
// =======================

function pay() {
    document.getElementById("app").innerHTML = "<p>⏳ Activation en cours...</p>";

    setTimeout(() => {
        generateAccess();
    }, 2000);
}

// =======================
// API RÉELLE (OPTION)
// =======================

async function generateAccess() {

    try {
        // 👉 ICI TU METTRAS TON BACKEND PLUS TARD
        // Exemple appel API réel :
        // const res = await fetch("https://ton-backend.com/create-line");

        // SIMULATION temporaire
        const user = "vip" + Math.floor(Math.random()*9999);
        const pass = "ts" + Math.floor(Math.random()*9999);

        const link = `http://my8k.me:8080/get.php?user=${user}&pass=${pass}&type=m3u_plus`;

        document.getElementById("app").innerHTML = `
            <div class="box">
                <h3>✅ Accès activé</h3>

                <p><b>User:</b> ${user}</p>
                <p><b>Pass:</b> ${pass}</p>

                <p><b>Lien:</b></p>
                <a href="${link}" target="_blank">${link}</a>

                <br><br>

                <img width="150"
                src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(link)}" />

                <p style="margin-top:10px;">📱 Scanner pour installation rapide</p>
            </div>
        `;

    } catch (e) {
        document.getElementById("app").innerHTML = "❌ Erreur serveur";
    }
}

// INIT
document.getElementById("app").innerHTML = `
    <button onclick="pay()">ACCÈS VIP – 5.55€</button>
`;
</script>

</body>
</html>
