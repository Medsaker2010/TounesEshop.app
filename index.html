<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE VIP - H.A. ROUIS</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .gold-text {
            background: linear-gradient(to bottom, #f9e27e 0%, #d4af37 50%, #b38728 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Satellite en Or (SVG Animé pour éviter les images cassées) */
        .satellite-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
            animation: orbit 20s linear infinite;
        }
        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .btn-vip {
            background: linear-gradient(135deg, #D4AF37 0%, #996515 100%);
            color: black; font-weight: 900; letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            transition: 0.3s;
        }
        .btn-vip:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(212, 175, 55, 0.4); }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-6 text-center">

    <!-- Header -->
    <header class="w-full">
        <h2 style="font-family: 'Cinzel';" class="gold-text text-xl tracking-[0.3em]">EMPIRE VIP</h2>
        <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Système de Pilotage Média</p>
    </header>

    <!-- Main Content -->
    <main class="flex flex-col items-center">
        <h1 style="font-family: 'Cinzel';" class="text-4xl md:text-6xl mb-6">
            LE PRESTIGE DU<br>
            <span class="gold-text">PILOTAGE MÉDIA</span>
        </h1>

        <p class="text-gray-400 text-sm max-w-xs mb-10 leading-relaxed font-light">
            L'automatisation totale au service de votre divertissement. Entrez dans l'ère de la gestion autonome 8K.
        </p>

        <!-- SATELLITE DORÉ (SVG INTÉGRÉ - Ne casse jamais) -->
        <div class="relative w-48 h-48 mb-12 flex items-center justify-center">
            <svg class="satellite-glow w-full h-full" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="10 5" opacity="0.3""")/>>
                <path d="M50 20 L55 45 L80 50 L55 55 L50 80 L45 55 L20 50 L45 45 Z" fill="#D4AF37">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
                </path>
                <circle cx="50" cy="50" r="8" fill="#F9E27E" />
            </svg>
            <div class="absolute inset-0 bg-yellow-500/5 blur-3xl rounded-full"></div>
        </div>

        <button class="btn-vip w-full max-w-sm py-5 rounded-full uppercase text-sm mb-6">
            Débloquer la Console (5.55€/an)
        </button>
        
        <p class="text-[10px] text-gray-600 uppercase tracking-[0.2em]">Paiement sécurisé par Stripe & Crypto</p>
    </main>

    <!-- Footer -->
    <footer class="w-full mt-10">
        <p class="text-[10px] text-gray-700 tracking-widest">
            © 2026 EDITION LIMITÉE - <span class="text-gray-400">H.A. ROUIS</span>
        </p>
    </footer>

</body>
</html>
