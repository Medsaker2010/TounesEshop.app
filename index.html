<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE VIP | H.A. ROUIS</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; text-align: center; overflow: hidden; }
        
        .gold-text {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', serif;
        }

        /* SATELLITE DORÉ - TAILLE OPTIMISÉE */
        .satellite-box {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.4));
        }
        
        .satellite-svg {
            width: 100%;
            height: 100%;
            animation: spin-luxe 25s linear infinite;
        }

        @keyframes spin-luxe {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-vip {
            background: linear-gradient(135deg, #D4AF37 0%, #996515 100%);
            color: #000;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            padding: 20px;
            width: 100%;
            max-width: 320px;
            border-radius: 2px;
        }
    </style>
</head>
<body class="p-8">

    <!-- HEADER -->
    <header>
        <h2 class="gold-text text-xl tracking-[0.4em]">EMPIRE VIP</h2>
        <p class="text-[9px] text-gray-500 uppercase tracking-[0.3em] mt-1">Console de Pilotage Média</p>
    </header>

    <!-- CENTRE : TITRE + SATELLITE -->
    <main class="flex flex-col items-center justify-center gap-6">
        <h1 class="gold-text text-3xl uppercase tracking-tighter leading-tight">
            L'EXPÉRIENCE<br><span class="text-white italic font-light lowercase" style="font-family: 'Montserrat';">Sensorielle</span>
        </h1>

        <div class="satellite-box">
            <svg class="satellite-svg" viewBox="0 0 100 100" xmlns="http://w3.org">
                <!-- Orbite -->
                <circle cx="50" cy="50" r="45" fill="none" stroke="#D4AF37" stroke-width="0.3" stroke-dasharray="4 2" opacity="0.4""")/>>
                <!-- Satellite Structure -->
                <rect x="42" y="42" width="16" height="16" fill="#D4AF37" rx="1" />
                <!-- Panneaux -->
                <rect x="15" y="47" width="25" height="6" fill="#996515" />
                <rect x="60" y="47" width="25" height="6" fill="#996515" />
                <!-- Cœur Brillant -->
                <circle cx="50" cy="50" r="3" fill="#FFF">
                    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
                </circle>
            </svg>
        </div>

        <p class="text-gray-400 text-[10px] tracking-[0.2em] leading-relaxed uppercase">
            L’AUTOMATISATION TOTALE AU SERVICE DE<br>VOTRE DIVERTISSEMENT. <span class="text-white font-bold">8K NATIVE.</span>
        </p>
    </main>

    <!-- FOOTER : BOUTON + CRÉDITS -->
    <footer class="w-full flex flex-col items-center gap-6">
        <button class="btn-vip text-xs">
            Débloquer la Console (5.55€/an)
        </button>
        <p class="text-[8px] text-gray-700 tracking-[0.5em] uppercase">
            © 2026 EDITION LIMITÉE — H.A. ROUIS
        </p>
    </footer>

</body>
</html>
