<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE VIP | H.A. ROUIS</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        
        /* TYPOGRAPHIE OR CENTRÉE */
        .gold-text {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', serif;
            display: block;
            text-align: center;
        }

        /* SATELLITE DORÉ ANIMÉ - CENTRAL */
        .satellite-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 250px;
            margin: 20px 0;
            position: relative;
        }
        
        .satellite-svg {
            width: 180px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            animation: rotate-satellite 20s linear infinite;
        }

        @keyframes rotate-satellite {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* BOUTON LINGOT */
        .btn-vip {
            background: linear-gradient(135deg, #D4AF37 0%, #996515 100%);
            color: black;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            border: none;
            transition: 0.4s ease;
        }
        .btn-vip:hover { transform: scale(1.02); filter: brightness(1.2); }

        .line-gold {
            height: 1px;
            width: 60px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            margin: 15px auto;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-8">

    <!-- HEADER CENTRAL -->
    <header class="w-full text-center">
        <h2 class="gold-text text-xl tracking-[0.5em]">EMPIRE VIP</h2>
        <div class="line-gold"></div>
        <p class="text-[9px] text-gray-500 uppercase tracking-[0.4em]">Système de Pilotage Média</p>
    </header>

    <!-- MAIN CONTENT - ALIGNEMENT TOTAL -->
    <main class="w-full max-w-lg flex flex-col items-center mt-12">
        
        <h1 class="gold-text text-3xl md:text-5xl leading-tight uppercase">
            Le Prestige du<br>
            <span class="text-white font-light lowercase italic" style="font-family: 'Montserrat';">Pilotage Média</span>
        </h1>

        <!-- LE SATELLITE (CENTRE DU MONDE) -->
        <div class="satellite-container">
            <svg class="satellite-svg" viewBox="0 0 100 100" xmlns="http://w3.org">
                <!-- Orbite fine -->
                <circle cx="50" cy="50" r="48" fill="none" stroke="#D4AF37" stroke-width="0.2" stroke-dasharray="2 2" opacity="0.5""")/>>
                <!-- Corps du Satellite -->
                <rect x="42" y="42" width="16" height="16" fill="#D4AF37" rx="2" />
                <!-- Panneaux Solaires -->
                <rect x="15" y="46" width="25" height="8" fill="#996515" />
                <rect x="60" y="46" width="25" height="8" fill="#996515" />
                <!-- Antennes -->
                <line x1="50" y1="42" x2="50" y2="30" stroke="#F9E27E" stroke-width="1" />
                <circle cx="50" cy="30" r="2" fill="#F9E27E" />
                <!-- Éclat central -->
                <circle cx="50" cy="50" r="4" fill="#F9E27E">
                    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
                </circle>
            </svg>
        </div>

        <p class="text-gray-400 text-[11px] text-center mb-10 leading-loose tracking-[0.1em] px-4">
            L’AUTOMATISATION TOTALE AU SERVICE DE VOTRE DIVERTISSEMENT.<br>
            <span class="text-white font-semibold">ZÉRO INTERVENTION HUMAINE.</span>
        </p>

        <!-- BOUTON VIP -->
        <button class="btn-vip w-full py-5 rounded-sm text-[11px]">
            Débloquer la Console (5.55€/an)
        </button>

    </main>

    <!-- FOOTER CENTRAL -->
    <footer class="mt-16 text-center">
        <p class="text-[8px] text-gray-700 tracking-[0.5em] uppercase">
            © 2026 EDITION LIMITÉE — <span class="text-gray-500">H.A. ROUIS</span>
        </p>
    </footer>

</body>
</html>
