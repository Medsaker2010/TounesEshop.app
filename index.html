<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE VIP | H.A. ROUIS</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; text-align: center; overflow: hidden; }
        
        .gold-text {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', serif;
        }

        /* SATELLITE ROND LUXE (ORBITAL) */
        .satellite-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .orbit {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .orbit-1 { width: 100%; height: 100%; animation: rotate 30s linear infinite; border-style: dashed; }
        .orbit-2 { width: 70%; height: 70%; animation: rotate-rev 20s linear infinite; border: 1px solid rgba(212, 175, 55, 0.4); }
        
        .core-sphere {
            width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #fcf6ba, #bf953f, #8a6d3b);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6), inset -5px -5px 15px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .satellite-dot {
            position: absolute; width: 8px; height: 8px;
            background: #fcf6ba; border-radius: 50%;
            top: -4px; left: 50%; transform: translateX(-50%);
            box-shadow: 0 0 10px #D4AF37;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .btn-vip {
            background: linear-gradient(135deg, #D4AF37 0%, #996515 100%);
            color: #000; font-weight: 900; letter-spacing: 4px;
            text-transform: uppercase; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            padding: 22px; width: 100%; max-width: 340px; border-radius: 0px; border: none;
        }
    </style>
</head>
<body class="p-10">

    <header>
        <h2 class="gold-text text-xl tracking-[0.6em]">EMPIRE VIP</h2>
        <div class="h-[1px] w-12 bg-yellow-600/40 mx-auto mt-2"></div>
    </header>

    <main class="flex flex-col items-center justify-center flex-grow">
        <h1 class="gold-text text-4xl md:text-5xl uppercase tracking-widest leading-tight mb-4">
            L'EXPÉRIENCE<br><span class="text-white font-extralight lowercase italic" style="font-family: 'Montserrat';">Sensorielle</span>
        </h1>

        <!-- SATELLITE ROND ET HARMONIEUX -->
        <div class="satellite-wrapper">
            <div class="orbit orbit-1">
                <div class="satellite-dot"></div>
            </div>
            <div class="orbit orbit-2">
                <div class="satellite-dot" style="top: auto; bottom: -4px;"></div>
            </div>
            <div class="core-sphere"></div>
            <!-- Lueur de fond -->
            <div class="absolute w-64 h-64 bg-yellow-500/5 blur-3xl rounded-full"></div>
        </div>

        <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase mt-4">
            Système de Pilotage Média • <span class="text-white">8K Ultra-Stream</span>
        </p>
    </main>

    <footer class="w-full flex flex-col items-center gap-8">
        <button class="btn-vip text-[10px]">
            Débloquer la Console (5.55€/an)
        </button>
        <p class="text-[8px] text-gray-800 tracking-[0.6em] uppercase">
            © 2026 EDITION LIMITÉE — H.A. ROUIS
        </p>
    </footer>

</body>
</html>
